<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Table</title>

  <link rel="stylesheet" href="./Projeto31.css">
</head>
<body>

  <section class="pricing">

    <div class="card">
      <h3>Básico</h3>
      <h2>R$19<span>/mês</span></h2>

      <ul>
        <li>✔ 1 Projeto</li>
        <li>✔ Suporte básico</li>
        <li>✔ 5GB armazenamento</li>
      </ul>

      <button>Começar</button>
    </div>

    <div class="card popular">
      <h3>Pro</h3>
      <h2>R$49<span>/mês</span></h2>

      <ul>
        <li>✔ 10 Projetos</li>
        <li>✔ Suporte prioritário</li>
        <li>✔ 50GB armazenamento</li>
      </ul>

      <button>Começar</button>
    </div>

    <div class="card">
      <h3>Premium</h3>
      <h2>R$99<span>/mês</span></h2>

      <ul>
        <li>✔ Projetos ilimitados</li>
        <li>✔ Suporte 24/7</li>
        <li>✔ 200GB armazenamento</li>
      </ul>

      <button>Começar</button>
    </div>

  </section>

</body>
</html>
