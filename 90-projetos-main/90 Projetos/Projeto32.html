<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Subscription</title>

  <link rel="stylesheet" href="./Proximo32.css">
</head>
<body>

  <div class="container">

    <div class="box">

      <h1>Fique por dentro</h1>
      <p>Receba atualizações, novidades e conteúdos diretamente no seu email.</p>

      <form>
        <input type="email" placeholder="Digite seu email" required>
        <button type="submit">Inscrever</button>
      </form>

      <small>Não enviamos spam. Cancele quando quiser.</small>

    </div>

  </div>

</body>
</html>
