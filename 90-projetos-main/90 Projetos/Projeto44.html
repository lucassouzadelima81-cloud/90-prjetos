<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Card Flip UI</title>

  <link rel="stylesheet" href="./Projeto44.css">
</head>
<body>

  <div class="scene">

    <div class="card">

      <!-- FRONT -->
      <div class="front">

        <div class="top">
          <span>Bank Card</span>
          <span>VISA</span>
        </div>

        <div class="chip"></div>

        <div class="number">
          1234 5678 9012 3456
        </div>

        <div class="bottom">
          <div>
            <small>Card Holder</small>
            <p>YOUR NAME</p>
          </div>

          <div>
            <small>Expires</small>
            <p>12/28</p>
          </div>
        </div>

      </div>

      <!-- BACK -->
      <div class="back">

        <div class="stripe"></div>

        <div class="cvv-box">
          <small>CVV</small>
          <div class="cvv">123</div>
        </div>

        <p class="note">Este é um cartão fictício para UI design</p>

      </div>

    </div>

  </div>

</body>
</html>
