<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>

  <link rel="stylesheet" href="./Proximo34.css">
</head>
<body>

  <div class="card">

    <div class="image">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800&auto=format&fit=crop" alt="Product">
    </div>

    <div class="content">

      <h3>Headphones Pro</h3>

      <p>Som de alta qualidade com cancelamento de ruído.</p>

      <div class="price">
        <span class="new">R$ 299</span>
        <span class="old">R$ 399</span>
      </div>

      <button>Add to Cart</button>

    </div>

  </div>

</body>
</html>
