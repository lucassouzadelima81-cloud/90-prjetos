<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip Card</title>

  <link rel="stylesheet" href="./Projeto29.css">
</head>
<body>

  <div class="scene">

    <div class="card">

      <!-- FRONT -->
      <div class="card-face card-front">
        <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=800&auto=format&fit=crop" alt="Squid Game">
        <h2>Squid Game</h2>
      </div>

      <!-- BACK -->
      <div class="card-face card-back">
        <h2>Game Over</h2>
        <p>Você sobreviveu ao jogo?</p>
        <button>Assistir</button>
      </div>

    </div>

  </div>

</body>
</html>
