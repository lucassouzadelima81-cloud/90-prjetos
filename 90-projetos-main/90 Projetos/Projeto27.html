<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Modal</title>
  <link rel="stylesheet" href="./Projeto27.css">
</head>
<body>

  <button class="open-popup-btn" onclick="openPopup()">
    Abrir Popup
  </button>

  <div class="popup" id="popup">
    <div class="popup-content">
      <h2>Popup Modal</h2>
      <p>Seu popup foi aberto com sucesso.</p>

      <button onclick="closePopup()">
        Fechar
      </button>
    </div>
  </div>

  <script src="./Projeto27.js"></script>
</body>
</html>
